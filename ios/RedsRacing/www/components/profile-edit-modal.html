<!-- Role-Based Profile Edit Modal -->
<div id="profile-edit-modal" class="hidden fixed inset-0 z-50 overflow-hidden">
  <div class="fixed inset-0 bg-black/80 backdrop-blur-sm" id="modal-backdrop"></div>
  
  <div class="relative min-h-screen flex items-center justify-center p-2 sm:p-4">
    <div class="relative bg-slate-900 rounded-2xl border border-slate-700 w-full max-w-5xl max-h-[95vh] flex flex-col shadow-2xl">
      
      <!-- Modal Header -->
      <div class="sticky top-0 bg-slate-900/98 backdrop-blur border-b border-slate-700 px-4 sm:px-6 py-4 rounded-t-2xl z-10">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-xl sm:text-2xl font-racing text-white uppercase">Customize Profile</h2>
            <p class="text-xs sm:text-sm text-slate-400 mt-1" id="role-badge">Loading...</p>
          </div>
          <button id="close-modal-btn" class="text-slate-400 hover:text-white transition p-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Tabs Navigation -->
      <div class="sticky top-[73px] bg-slate-900/95 backdrop-blur border-b border-slate-700/50 px-2 sm:px-4 overflow-x-auto scrollbar-hide z-10">
        <div id="tabs-container" class="flex space-x-1 min-w-max">
          <!-- Tabs will be injected by JS based on role -->
        </div>
      </div>

      <!-- Tab Content -->
      <div class="flex-1 overflow-y-auto p-4 sm:p-6 pb-32">
        
        <!-- Profile Tab -->
        <div id="tab-profile" class="tab-content hidden">
          <h3 class="text-lg font-bold text-white mb-4 flex items-center">
            <i class="fas fa-user mr-2 text-blue-400"></i> Basic Information
          </h3>
          
          <div class="space-y-4">
            <!-- Avatar & Banner -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Avatar URL</label>
                <input type="url" id="edit-avatar" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500" placeholder="https://...">
                <div class="mt-2 w-20 h-20 rounded-full overflow-hidden bg-slate-800 flex items-center justify-center">
                  <img id="avatar-preview" src="" alt="" class="w-full h-full object-cover hidden">
                  <span id="avatar-placeholder" class="text-2xl">👤</span>
                </div>
              </div>
              
              <div id="banner-field" class="hidden">
                <label class="block text-sm font-semibold text-slate-300 mb-2">Banner URL <span class="text-yellow-400">✨</span></label>
                <input type="url" id="edit-banner" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500" placeholder="https://...">
                <p class="text-xs text-slate-400 mt-1">Recommended: 1200x300px</p>
              </div>
            </div>

            <!-- Display Name & Username -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Display Name</label>
                <input type="text" id="edit-display-name" maxlength="30" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500" placeholder="Your Name">
                <p class="text-xs text-slate-400 mt-1"><span id="name-count">0</span>/30</p>
              </div>
              
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Username</label>
                <input type="text" id="edit-username" maxlength="20" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500" placeholder="@username">
              </div>
            </div>

            <!-- Bio -->
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-2">Bio</label>
              <textarea id="edit-bio" rows="4" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 resize-none" placeholder="Tell your racing story..."></textarea>
              <p class="text-xs text-slate-400 mt-1"><span id="bio-count">0</span>/<span id="bio-limit">300</span></p>
            </div>

            <!-- Location & Racing Since -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Location <span class="text-slate-500">(Optional)</span></label>
                <input type="text" id="edit-location" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500" placeholder="City, State">
              </div>
              
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2">Racing Since</label>
                <input type="number" id="edit-racing-since" min="1950" max="2026" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500" placeholder="2020">
              </div>
            </div>
          </div>
        </div>

        <!-- Garage Tab -->
        <div id="tab-garage" class="tab-content hidden">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold text-white flex items-center">
              <i class="fas fa-car mr-2 text-red-400"></i> My Garage
            </h3>
            <button id="add-car-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
              <i class="fas fa-plus mr-2"></i>Add Car
            </button>
          </div>
          
          <p class="text-sm text-slate-400 mb-4">
            <span id="car-limit-text">Add up to 5 cars</span> <span id="car-count-display"></span>
          </p>

          <!-- Car Add/Edit Form -->
          <div id="car-form" class="hidden mb-4 bg-slate-800/50 border border-slate-600 rounded-lg p-4">
            <div class="flex items-center justify-between mb-3">
              <h4 class="text-white font-semibold" id="car-form-title">Add New Car</h4>
              <button id="cancel-car-btn" class="text-slate-400 hover:text-white">
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="space-y-3">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm text-slate-300 mb-1">Make *</label>
                  <input type="text" id="car-make" class="w-full bg-slate-900 border border-slate-600 text-white rounded px-3 py-2" placeholder="Chevrolet, Ford, etc.">
                </div>
                <div>
                  <label class="block text-sm text-slate-300 mb-1">Model *</label>
                  <input type="text" id="car-model" class="w-full bg-slate-900 border border-slate-600 text-white rounded px-3 py-2" placeholder="Camaro, Mustang, etc.">
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm text-slate-300 mb-1">Year</label>
                  <input type="number" id="car-year" min="1900" max="2026" class="w-full bg-slate-900 border border-slate-600 text-white rounded px-3 py-2" placeholder="2020">
                </div>
                <div>
                  <label class="block text-sm text-slate-300 mb-1">Photo URL</label>
                  <input type="url" id="car-photo" class="w-full bg-slate-900 border border-slate-600 text-white rounded px-3 py-2" placeholder="https://...">
                </div>
              </div>
              <div>
                <label class="block text-sm text-slate-300 mb-1">Modifications</label>
                <textarea id="car-mods" rows="2" class="w-full bg-slate-900 border border-slate-600 text-white rounded px-3 py-2 resize-none" placeholder="Turbo, exhaust, suspension..."></textarea>
              </div>
              <div class="flex gap-2">
                <button id="save-car-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-semibold">
                  <i class="fas fa-check mr-2"></i>Save Car
                </button>
                <button id="cancel-car-form-btn" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded text-sm">
                  Cancel
                </button>
              </div>
            </div>
          </div>

          <div id="cars-list" class="space-y-3">
            <p class="text-center py-8 text-slate-500">No cars added yet. Click "Add Car" to start building your garage!</p>
          </div>
        </div>

        <!-- Social Tab -->
        <div id="tab-social" class="tab-content hidden">
          <h3 class="text-lg font-bold text-white mb-4 flex items-center">
            <i class="fas fa-share-alt mr-2 text-purple-400"></i> Social Links
          </h3>
          
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-2">
                <i class="fab fa-instagram mr-2"></i>Instagram
              </label>
              <input type="text" id="edit-instagram" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500" placeholder="@username">
            </div>
            
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-2">
                <i class="fab fa-tiktok mr-2"></i>TikTok
              </label>
              <input type="text" id="edit-tiktok" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500" placeholder="@username">
            </div>
            
            <div id="youtube-field">
              <label class="block text-sm font-semibold text-slate-300 mb-2">
                <i class="fab fa-youtube mr-2"></i>YouTube
              </label>
              <input type="text" id="edit-youtube" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500" placeholder="Channel URL or @handle">
            </div>

            <div id="discord-field" class="hidden">
              <label class="block text-sm font-semibold text-slate-300 mb-2">
                <i class="fab fa-discord mr-2"></i>Discord
              </label>
              <input type="text" id="edit-discord" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500" placeholder="Username#0000">
            </div>

            <div id="twitch-field" class="hidden">
              <label class="block text-sm font-semibold text-slate-300 mb-2">
                <i class="fab fa-twitch mr-2"></i>Twitch
              </label>
              <input type="text" id="edit-twitch" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-purple-500" placeholder="Username">
            </div>
          </div>
        </div>

        <!-- Appearance Tab (Team/Admin only) -->
        <div id="tab-appearance" class="tab-content hidden">
          <h3 class="text-lg font-bold text-white mb-4 flex items-center">
            <i class="fas fa-palette mr-2 text-pink-400"></i> Appearance
          </h3>
          
          <p class="text-slate-400 text-sm mb-4">Coming soon: Theme presets, avatar frames, and more!</p>
        </div>

        <!-- Racing Tab -->
        <div id="tab-racing" class="tab-content hidden">
          <h3 class="text-lg font-bold text-white mb-4 flex items-center">
            <i class="fas fa-flag-checkered mr-2 text-green-400"></i> Racing Profile
          </h3>
          
          <div class="space-y-4">
            <!-- Favorite Track -->
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-2">Favorite Track</label>
              <input type="text" id="edit-favorite-track" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500" placeholder="e.g. Kart2Kart, SpeedHive">
            </div>
            
            <!-- Racing Class -->
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-2">Racing Class</label>
              <input type="text" id="edit-racing-class" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500" placeholder="e.g. Junior, Senior, Open">
            </div>
            
            <!-- Best Lap Time -->
            <div>
              <label class="block text-sm font-semibold text-slate-300 mb-2">Personal Best Lap <span class="text-slate-500">(Optional)</span></label>
              <input type="text" id="edit-best-lap" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500" placeholder="e.g. 45.231s at Kart2Kart">
            </div>
            
            <!-- Podium Finishes -->
            <div class="grid grid-cols-3 gap-4">
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2 text-center">🥇 1st</label>
                <input type="number" id="edit-wins" min="0" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 text-center" placeholder="0">
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2 text-center">🥈 2nd</label>
                <input type="number" id="edit-second" min="0" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 text-center" placeholder="0">
              </div>
              <div>
                <label class="block text-sm font-semibold text-slate-300 mb-2 text-center">🥉 3rd</label>
                <input type="number" id="edit-third" min="0" class="w-full bg-slate-800/50 border border-slate-600 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 text-center" placeholder="0">
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Sticky Save Bar -->
      <div class="sticky bottom-0 bg-slate-900/98 backdrop-blur border-t border-slate-700 px-4 sm:px-6 py-4 rounded-b-2xl shadow-[0_-4px_12px_rgba(0,0,0,0.5)]">
        <div class="flex flex-wrap items-center gap-3">
          <div class="flex-1 text-sm text-slate-400" id="save-status"></div>
          <button id="cancel-edit-btn" class="px-4 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-semibold transition">
            Cancel
          </button>
          <button id="save-profile-btn" class="px-6 py-2.5 bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white rounded-lg font-semibold transition shadow-lg">
            <i class="fas fa-save mr-2"></i>Save Changes
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }
  .scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  .tab-button {
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
    font-weight: 600;
    color: rgb(148, 163, 184);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-button:hover {
    color: white;
    background: rgba(59, 130, 246, 0.1);
  }

  .tab-button.active {
    color: white;
    border-bottom-color: rgb(59, 130, 246);
    background: rgba(59, 130, 246, 0.1);
  }

  .tab-content {
    animation: fadeIn 0.3s ease-in;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
