<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Race Control - RedsRacing Admin</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="styles/tailwind.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%);
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .control-panel {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .big-button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }
        .post-button {
            background: linear-gradient(45deg, #3b82f6, #1d4ed8);
            color: white;
        }
        .post-button:active {
            transform: scale(0.98);
        }
        .event-btn {
            flex: 1;
            padding: 12px;
            margin: 4px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .yellow { background: #fbbf24; color: #000; }
        .green { background: #10b981; color: #fff; }
        .red { background: #ef4444; color: #fff; }
        .black { background: #1f2937; color: #fff; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 16px;
            margin-top: 8px;
        }
        label {
            color: #94a3b8;
            font-weight: 600;
            display: block;
            margin-top: 12px;
        }
        .status-indicator {
            padding: 8px 16px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .status-live {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        .status-inactive {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
            border: 1px solid #94a3b8;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h1 class="text-3xl font-bold text-white mb-2 text-center">
            <i class="fas fa-flag-checkered mr-2"></i>Live Race Control
        </h1>
        <p class="text-slate-400 text-center mb-6">Quick updates from the track</p>
        
        <div id="status" class="status-indicator status-inactive">
            📡 Checking authentication...
        </div>
        
        <!-- Quick Login Form (hidden by default) -->
        <div id="quickLogin" style="display:none;">
            <input type="email" id="loginEmail" placeholder="Email" style="margin-top:8px;" />
            <input type="password" id="loginPassword" placeholder="Password" style="margin-top:8px;" />
            <button onclick="quickLogin()" class="big-button" style="background:#3b82f6;margin-top:12px;">
                <i class="fas fa-sign-in-alt mr-2"></i>Sign In
            </button>
        </div>

        <!-- Race Info -->
        <div class="mb-6">
            <label>Track Name</label>
            <input type="text" id="trackName" placeholder="e.g., Golden Sands Speedway" />
            
            <label>Race Type</label>
            <select id="raceType">
                <option value="Heat Race">Heat Race</option>
                <option value="Feature Race" selected>Feature Race</option>
                <option value="Qualifying">Qualifying</option>
                <option value="Practice">Practice</option>
            </select>
        </div>

        <!-- Lap Counter -->
        <div class="mb-6">
            <label>Current Lap / Total Laps</label>
            <div class="flex gap-2">
                <input type="number" id="currentLap" placeholder="15" style="width: 50%;" />
                <input type="number" id="totalLaps" placeholder="25" style="width: 50%;" />
            </div>
        </div>

        <!-- Driver Positions -->
        <div class="mb-6">
            <h3 class="text-xl font-bold text-blue-400 mb-3">Jon Kirsch #8</h3>
            <label>Position</label>
            <select id="jonPosition">
                <option value="1">1st Place 🥇</option>
                <option value="2">2nd Place 🥈</option>
                <option value="3" selected>3rd Place 🥉</option>
                <option value="4">4th Place</option>
                <option value="5">5th Place</option>
                <option value="6">6th Place</option>
                <option value="7">7th Place</option>
                <option value="8">8th Place</option>
                <option value="9">9th Place</option>
                <option value="10">10th Place</option>
                <option value="11">11th Place</option>
                <option value="12">12th Place</option>
                <option value="13">13th Place</option>
                <option value="14">14th Place</option>
                <option value="15">15th Place</option>
                <option value="DNF">DNF</option>
            </select>
            
            <label>Gap to Leader (seconds) - Optional</label>
            <input type="text" id="jonGap" placeholder="e.g., +1.2 or Leading" />
        </div>

        <div class="mb-6">
            <h3 class="text-xl font-bold text-red-400 mb-3">Jonny Kirsch #88</h3>
            <label>Position</label>
            <select id="jonnyPosition">
                <option value="1">1st Place 🥇</option>
                <option value="2">2nd Place 🥈</option>
                <option value="3">3rd Place 🥉</option>
                <option value="4">4th Place</option>
                <option value="5">5th Place</option>
                <option value="6">6th Place</option>
                <option value="7">7th Place</option>
                <option value="8" selected>8th Place</option>
                <option value="9">9th Place</option>
                <option value="10">10th Place</option>
                <option value="11">11th Place</option>
                <option value="12">12th Place</option>
                <option value="13">13th Place</option>
                <option value="14">14th Place</option>
                <option value="15">15th Place</option>
                <option value="DNF">DNF</option>
            </select>
            
            <label>Gap to Leader (seconds) - Optional</label>
            <input type="text" id="jonnyGap" placeholder="e.g., +5.8" />
        </div>

        <!-- POST UPDATE BUTTON -->
        <button onclick="postUpdate()" class="big-button post-button">
            <i class="fas fa-wifi mr-2"></i>POST UPDATE
        </button>
    </div>

    <!-- Quick Race Events -->
    <div class="control-panel">
        <h3 class="text-xl font-bold text-white mb-4">Quick Events</h3>
        <div class="flex flex-wrap">
            <button onclick="postEvent('🟢 Green Flag')" class="event-btn green">
                🟢 Green Flag
            </button>
            <button onclick="postEvent('🟡 Caution')" class="event-btn yellow">
                🟡 Caution
            </button>
            <button onclick="postEvent('🔴 Red Flag')" class="event-btn red">
                🔴 Red Flag
            </button>
            <button onclick="postEvent('🏁 Checkered Flag')" class="event-btn black">
                🏁 Checkered
            </button>
        </div>
        <button onclick="endRace()" class="big-button" style="background: #6366f1; color: white; margin-top: 12px;">
            <i class="fas fa-stop-circle mr-2"></i>End Race Session
        </button>
    </div>

    <!-- Recent Updates Log -->
    <div class="control-panel">
        <h3 class="text-xl font-bold text-white mb-4">Recent Updates</h3>
        <div id="updateLog" class="text-slate-400 text-sm space-y-2">
            <p>No updates yet...</p>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: 'AIzaSyARFiFCadGKFUc_s6x3qNX8F4jsVawkzVg',
            authDomain: 'redsracing-a7f8b.firebaseapp.com',
            projectId: 'redsracing-a7f8b',
            storageBucket: 'redsracing-a7f8b.firebasestorage.app',
            messagingSenderId: '517034606151',
            appId: '1:517034606151:web:24cae262e1d98832757b62'
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.firestore();
        const updateLogEl = document.getElementById('updateLog');
        const statusEl = document.getElementById('status');

        // Check auth status
        firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});
        
        firebase.auth().onAuthStateChanged(async (user) => {
            if (!user) {
                // Wait for auth to sync
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                if (!firebase.auth().currentUser) {
                    // Show quick login form
                    statusEl.className = 'status-indicator';
                    statusEl.style.background = 'rgba(251, 191, 36, 0.2)';
                    statusEl.style.color = '#fbbf24';
                    statusEl.style.border = '1px solid #fbbf24';
                    statusEl.innerHTML = '⚠️ Please sign in to post live updates';
                    document.getElementById('quickLogin').style.display = 'block';
                    
                    // Disable race controls
                    document.querySelectorAll('button:not([onclick*="quickLogin"]), input:not([id*="login"]), select').forEach(el => el.disabled = true);
                } else {
                    showAuthenticated(firebase.auth().currentUser);
                }
            } else {
                showAuthenticated(user);
            }
        });
        
        function showAuthenticated(user) {
            console.log('✅ Authenticated as:', user.email);
            statusEl.innerHTML = '✅ Ready - ' + user.email.split('@')[0];
            statusEl.className = 'status-indicator status-inactive';
            document.getElementById('quickLogin').style.display = 'none';
            // Enable all controls
            document.querySelectorAll('button, input, select').forEach(el => el.disabled = false);
        }
        
        async function quickLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }
            
            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                // Auth state change will handle the rest
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        }

        function getOrdinalSuffix(n) {
            if (n === 'DNF') return '';
            const num = parseInt(n);
            const s = ['th', 'st', 'nd', 'rd'];
            const v = num % 100;
            return s[(v - 20) % 10] || s[v] || s[0];
        }

        async function postUpdate() {
            const trackName = document.getElementById('trackName').value || 'Unknown Track';
            const raceType = document.getElementById('raceType').value;
            const currentLap = document.getElementById('currentLap').value;
            const totalLaps = document.getElementById('totalLaps').value;
            const jonPos = document.getElementById('jonPosition').value;
            const jonGap = document.getElementById('jonGap').value;
            const jonnyPos = document.getElementById('jonnyPosition').value;
            const jonnyGap = document.getElementById('jonnyGap').value;

            if (!currentLap || !totalLaps) {
                alert('Please enter lap information!');
                return;
            }

            const update = {
                trackName,
                raceType,
                currentLap: parseInt(currentLap),
                totalLaps: parseInt(totalLaps),
                isLive: true,
                drivers: {
                    jon: {
                        number: 8,
                        position: jonPos,
                        gap: jonGap || 'N/A'
                    },
                    jonny: {
                        number: 88,
                        position: jonnyPos,
                        gap: jonnyGap || 'N/A'
                    }
                },
                lastUpdate: firebase.firestore.FieldValue.serverTimestamp(),
                updatedBy: firebase.auth().currentUser?.email || 'admin'
            };

            try {
                await db.collection('live_race').doc('current').set(update);
                
                // Log the update
                const logEntry = `✅ Lap ${currentLap}: Jon P${jonPos}, Jonny P${jonnyPos}`;
                addToLog(logEntry);
                
                // Update status
                statusEl.className = 'status-indicator status-live';
                statusEl.innerHTML = '<i class="fas fa-circle animate-pulse mr-2"></i>LIVE: ' + trackName;
                
                // Success feedback
                navigator.vibrate && navigator.vibrate(100);
                
            } catch (error) {
                console.error('Error posting update:', error);
                alert('Failed to post update: ' + error.message);
            }
        }

        async function postEvent(eventText) {
            try {
                await db.collection('live_race').doc('current').update({
                    event: eventText,
                    eventTimestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                addToLog(`🚩 ${eventText}`);
                navigator.vibrate && navigator.vibrate([50, 50, 50]);
                
            } catch (error) {
                console.error('Error posting event:', error);
            }
        }

        async function endRace() {
            if (!confirm('End this race session? This will stop live updates.')) return;
            
            try {
                await db.collection('live_race').doc('current').update({
                    isLive: false,
                    endedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                statusEl.className = 'status-indicator status-inactive';
                statusEl.textContent = '✓ Race session ended';
                addToLog('🏁 Race session ended');
                
            } catch (error) {
                console.error('Error ending race:', error);
            }
        }

        function addToLog(message) {
            const time = new Date().toLocaleTimeString();
            const logHTML = `<p class="text-white"><strong>${time}</strong> - ${message}</p>`;
            updateLogEl.innerHTML = logHTML + updateLogEl.innerHTML;
            
            // Keep only last 10 entries
            const entries = updateLogEl.querySelectorAll('p');
            if (entries.length > 10) {
                entries[entries.length - 1].remove();
            }
        }

        // Listen for existing race session
        db.collection('live_race').doc('current').onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.isLive) {
                    statusEl.className = 'status-indicator status-live';
                    statusEl.innerHTML = '<i class="fas fa-circle animate-pulse mr-2"></i>LIVE: ' + (data.trackName || 'Race in progress');
                }
            }
        });
    </script>
</body>
</html>
