<!-- Live Race Widget - Include this on homepage/racing pages -->
<div id="liveRaceWidget" style="display: none;" class="live-race-widget glass-card p-6 rounded-2xl mb-8 border border-red-500/50">
    <style>
        .live-race-widget {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.95) 100%);
            backdrop-filter: blur(12px);
            animation: borderPulse 2s ease-in-out infinite;
        }
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(239, 68, 68, 0.5); }
            50% { border-color: rgba(239, 68, 68, 0.8); }
        }
        .position-row {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid;
            transition: all 0.3s;
        }
        .position-row:hover {
            transform: translateX(4px);
        }
        .position-badge {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-center;
            font-size: 24px;
            font-weight: bold;
        }
        .driver-number {
            font-size: 32px;
            font-weight: 900;
            font-family: 'Racing Sans One', sans-serif;
        }
        .status-live-badge {
            background: linear-gradient(45deg, #ef4444, #dc2626);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }
    </style>

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-2xl md:text-3xl font-bold text-white flex items-center">
            <span class="status-live-badge w-4 h-4 rounded-full mr-3"></span>
            <span id="liveTrackName">LIVE RACE</span>
        </h3>
        <div class="text-right">
            <div class="text-yellow-400 font-bold text-xl" id="liveLapInfo">LAP --/--</div>
            <div class="text-slate-400 text-sm" id="liveRaceType">--</div>
        </div>
    </div>

    <!-- Jon Kirsch #8 -->
    <div class="position-row" id="jonRow" style="border-left-color: #3b82f6;">
        <div class="flex items-center">
            <div class="position-badge bg-blue-500/20 text-blue-400" id="jonPositionBadge">
                --
            </div>
            <div class="flex-1 ml-4">
                <div class="flex items-center mb-1">
                    <span class="driver-number text-blue-400 mr-2">#8</span>
                    <span class="text-white font-bold text-lg">Jon Kirsch</span>
                </div>
                <div class="text-sm text-slate-400" id="jonGap">Gap: --</div>
            </div>
            <div class="text-right hidden md:block">
                <div class="text-slate-400 text-xs">Position</div>
                <div class="text-blue-400 font-bold text-lg" id="jonPositionText">--</div>
            </div>
        </div>
    </div>

    <!-- Jonny Kirsch #88 -->
    <div class="position-row" id="jonnyRow" style="border-left-color: #ef4444;">
        <div class="flex items-center">
            <div class="position-badge bg-red-500/20 text-red-400" id="jonnyPositionBadge">
                --
            </div>
            <div class="flex-1 ml-4">
                <div class="flex items-center mb-1">
                    <span class="driver-number text-red-400 mr-2">#88</span>
                    <span class="text-white font-bold text-lg">Jonny Kirsch</span>
                </div>
                <div class="text-sm text-slate-400" id="jonnyGap">Gap: --</div>
            </div>
            <div class="text-right hidden md:block">
                <div class="text-slate-400 text-xs">Position</div>
                <div class="text-red-400 font-bold text-lg" id="jonnyPositionText">--</div>
            </div>
        </div>
    </div>

    <!-- Race Status Footer -->
    <div class="mt-6 pt-4 border-t border-slate-700 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span id="raceEvent" class="text-slate-400 text-sm">🏁 Racing</span>
        </div>
        <div class="text-slate-500 text-xs" id="lastUpdateTime">
            Updated: --
        </div>
    </div>
</div>

<script>
(function() {
    // Initialize Firebase if not already done
    if (typeof firebase === 'undefined' || !firebase.apps.length) {
        console.warn('Firebase not initialized for live race widget');
        return;
    }

    const db = firebase.firestore();
    const widget = document.getElementById('liveRaceWidget');

    function getOrdinalSuffix(n) {
        if (n === 'DNF') return 'DNF';
        const num = parseInt(n);
        if (num === 1) return '1st';
        if (num === 2) return '2nd';
        if (num === 3) return '3rd';
        return num + 'th';
    }

    function formatTimestamp(timestamp) {
        if (!timestamp) return 'Just now';
        const now = Date.now();
        const diff = now - timestamp.toMillis();
        const seconds = Math.floor(diff / 1000);
        
        if (seconds < 10) return 'Just now';
        if (seconds < 60) return seconds + 's ago';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return minutes + 'm ago';
        return 'Over 1h ago';
    }

    // Listen to live race updates
    db.collection('live_race').doc('current').onSnapshot((doc) => {
        if (!doc.exists) {
            widget.style.display = 'none';
            return;
        }

        const data = doc.data();
        
        // Only show if race is live
        if (!data.isLive) {
            widget.style.display = 'none';
            return;
        }

        // Show widget
        widget.style.display = 'block';

        // Update header
        document.getElementById('liveTrackName').textContent = data.trackName || 'LIVE RACE';
        document.getElementById('liveLapInfo').textContent = `LAP ${data.currentLap}/${data.totalLaps}`;
        document.getElementById('liveRaceType').textContent = data.raceType || '';

        // Update Jon #8
        const jon = data.drivers?.jon;
        if (jon) {
            const jonPos = jon.position;
            document.getElementById('jonPositionBadge').textContent = jonPos;
            document.getElementById('jonPositionText').textContent = getOrdinalSuffix(jonPos);
            document.getElementById('jonGap').textContent = 
                jonPos === '1' || jonPos === 1 ? 'Leading' : `Gap: ${jon.gap}`;
            
            // Medal for top 3
            if (jonPos === '1' || jonPos === 1) {
                document.getElementById('jonPositionBadge').textContent = '🥇';
            } else if (jonPos === '2' || jonPos === 2) {
                document.getElementById('jonPositionBadge').textContent = '🥈';
            } else if (jonPos === '3' || jonPos === 3) {
                document.getElementById('jonPositionBadge').textContent = '🥉';
            }
        }

        // Update Jonny #88
        const jonny = data.drivers?.jonny;
        if (jonny) {
            const jonnyPos = jonny.position;
            document.getElementById('jonnyPositionBadge').textContent = jonnyPos;
            document.getElementById('jonnyPositionText').textContent = getOrdinalSuffix(jonnyPos);
            document.getElementById('jonnyGap').textContent = 
                jonnyPos === '1' || jonnyPos === 1 ? 'Leading' : `Gap: ${jonny.gap}`;
            
            // Medal for top 3
            if (jonnyPos === '1' || jonnyPos === 1) {
                document.getElementById('jonnyPositionBadge').textContent = '🥇';
            } else if (jonnyPos === '2' || jonnyPos === 2) {
                document.getElementById('jonnyPositionBadge').textContent = '🥈';
            } else if (jonnyPos === '3' || jonnyPos === 3) {
                document.getElementById('jonnyPositionBadge').textContent = '🥉';
            }
        }

        // Update race event
        if (data.event) {
            document.getElementById('raceEvent').textContent = data.event;
        }

        // Update timestamp
        if (data.lastUpdate) {
            document.getElementById('lastUpdateTime').textContent = 
                'Updated: ' + formatTimestamp(data.lastUpdate);
        }
    });
})();
</script>
