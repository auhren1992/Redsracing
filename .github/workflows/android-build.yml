name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        working-directory: android
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > upload-keystore.jks

      - name: Build Release Bundle
        env:
          REDSRACING_KEYSTORE_PASSWORD: ${{ secrets.REDSRACING_KEYSTORE_PASSWORD }}
          REDSRACING_KEY_PASSWORD: ${{ secrets.REDSRACING_KEY_PASSWORD }}
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --stacktrace -PREDSRACING_KEYSTORE_PASSWORD=$REDSRACING_KEYSTORE_PASSWORD -PREDSRACING_KEY_PASSWORD=$REDSRACING_KEY_PASSWORD

      - name: Upload to Google Play (Internal Testing)
        continue-on-error: true
        env:
          PLAYSTORE_DEPLOY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        working-directory: android
        run: |
          if [ -z "$PLAYSTORE_DEPLOY_KEY" ]; then
            echo "⚠️ Google Play service account credentials not configured, skipping upload"
            exit 0
          fi
          
          # Create service account JSON file with absolute path
          SERVICE_ACCOUNT_FILE="$PWD/service-account.json"
          echo "$PLAYSTORE_DEPLOY_KEY" > "$SERVICE_ACCOUNT_FILE"
          
          # Upload to Google Play using Gradle Play Publisher plugin
          ./gradlew publishBundle \
            -Pplay.serviceAccountCredentials="$SERVICE_ACCOUNT_FILE" \
            --no-daemon \
            --stacktrace
          
          # Clean up service account file
          rm -f "$SERVICE_ACCOUNT_FILE"

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Clean up keystore
        if: always()
        working-directory: android
        run: rm -f upload-keystore.jks
