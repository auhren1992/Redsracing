<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - RedsRacing #8</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a0e17; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .loader { text-align: center; }
    .spinner { width: 48px; height: 48px; border: 3px solid rgba(251,191,36,0.2); border-top-color: #fbbf24; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <div>Loading your dashboard...</div>
  </div>
  <script>
    firebase.initializeApp({apiKey:"AIzaSyARFiFCadGKFUc_s6x3qNX8F4jsVawkzVg",authDomain:"redsracing-a7f8b.firebaseapp.com",projectId:"redsracing-a7f8b",storageBucket:"redsracing-a7f8b.firebasestorage.app",messagingSenderId:"517034606151",appId:"1:517034606151:web:24cae262e1d98832757b62"});
    var auth = firebase.auth();
    var db = firebase.firestore();

    auth.onAuthStateChanged(async function(user) {
      if (!user) { window.location.replace('signup.html'); return; }
      try { localStorage.setItem('rr_auth_uid', user.uid); } catch(_) {}
      // Get signup role from Firestore
      var role = 'fan';
      try {
        var doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists()) role = doc.data().signupRole || 'fan';
      } catch(_) {}
      try { localStorage.setItem('rr_signup_role', role); } catch(_) {}
      // Redirect to role-specific site
      var folders = { fan: '/fan/', racer: '/racer/', crew: '/crew/' };
      var dest = (folders[role] || '/fan/') + 'dashboard.html';
      window.location.replace(dest);
    });
  </script>
</body>
</html>
